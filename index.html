<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身份胜率分析 - 近7日趋势</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .container { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: #16213e; padding: 20px; border-right: 1px solid #0f3460; overflow-y: auto; }
        .sidebar h3 { color: #e94560; margin-bottom: 12px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .mode-btn { display: block; width: 100%; padding: 12px 16px; margin-bottom: 8px; background: #0f3460; border: none; border-radius: 8px; color: #aaa; font-size: 14px; cursor: pointer; text-align: left; transition: all 0.2s; }
        .mode-btn:hover { background: #1a4a7a; color: #fff; }
        .mode-btn.active { background: #e94560; color: #fff; }
        .main { flex: 1; padding: 24px; overflow-y: auto; width: 100%; min-width: 0; box-sizing: border-box; }
        .header { margin-bottom: 24px; }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .header p { color: #888; font-size: 14px; }
        .identity-selector { background: #16213e; border-radius: 12px; padding: 16px; margin-bottom: 24px; }
        .selector-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .selector-header h3 { font-size: 14px; color: #e94560; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn { background: #0f3460; border: none; color: #aaa; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .btn:hover { background: #1a4a7a; color: #fff; }
        .btn.active { background: #e94560; color: #fff; }
        .identity-list { display: flex; flex-wrap: wrap; gap: 8px; max-height: 200px; overflow-y: auto; }
        .identity-checkbox { display: none; }
        .identity-label { display: inline-block; padding: 6px 12px; background: #0f3460; border-radius: 20px; font-size: 13px; color: #aaa; cursor: pointer; transition: all 0.2s; user-select: none; }
        .identity-label:hover { background: #1a4a7a; color: #fff; }
        .identity-checkbox:checked + .identity-label { background: #e94560; color: #fff; }
        .chart-grid { display: flex; flex-direction: column; gap: 24px; width: 100%; min-width: 0; }
        .chart-box { background: #16213e; border-radius: 12px; padding: 20px; width: 100%; box-sizing: border-box; overflow: hidden; }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .chart-header h3 { font-size: 16px; color: #fff; }
        .chart-wrapper { position: relative; height: 300px; width: 100%; }
        .trend-info { margin-top: 16px; padding: 12px; background: #0f3460; border-radius: 8px; font-size: 12px; }
        .trend-info h4 { color: #e94560; margin-bottom: 8px; }
        .trend-list { max-height: 120px; overflow-y: auto; }
        .trend-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #1a4a7a; }
        .trend-item:last-child { border-bottom: none; }
        .trend-name { color: #fff; }
        .trend-up { color: #4ade80; }
        .trend-down { color: #f87171; }
        .trend-stable { color: #fbbf24; }
        .legend-note { margin-top: 8px; font-size: 11px; color: #666; }
        
        /* T1-T4 Styles */
        .tier-section { background: #16213e; border-radius: 12px; padding: 20px; margin-top: 24px; }
        .tier-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .tier-header h3 { font-size: 16px; color: #fff; }
        .tier-legend { display: flex; gap: 12px; font-size: 11px; }
        .tier-legend-item { display: flex; align-items: center; gap: 4px; }
        .tier-dot { width: 10px; height: 10px; border-radius: 50%; }
        .tier-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .tier-table th { background: #0f3460; padding: 10px 12px; text-align: left; color: #888; font-weight: normal; text-transform: uppercase; font-size: 11px; }
        .tier-table td { padding: 10px 12px; border-bottom: 1px solid #0f3460; }
        .tier-table tr:hover { background: #1a4a7a; cursor: pointer; }
        .tier-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; }
        .tier-t1 { background: #ef444422; color: #ef4444; }
        .tier-t2 { background: #f59e0b22; color: #f59e0b; }
        .tier-t3 { background: #22c55e22; color: #22c55e; }
        .tier-t4 { background: #6b728022; color: #6b7280; }
        .score-bar { display: inline-block; width: 50px; height: 4px; background: #0f3460; border-radius: 2px; vertical-align: middle; margin-right: 6px; overflow: hidden; }
        .score-fill { display: inline-block; height: 100%; border-radius: 2px; }
        
        /* AI Summary */
        .ai-summary { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border-left: 3px solid #e94560; padding: 16px; margin-bottom: 24px; border-radius: 0 12px 12px 0; font-size: 13px; line-height: 1.7; color: #ccc; }
        .ai-summary-title { color: #e94560; font-weight: 600; margin-bottom: 8px; }
        
        /* Role Detail */
        .role-detail { display: none; background: #16213e; border-radius: 12px; padding: 20px; margin-top: 24px; border: 1px solid #e94560; }
        .role-detail.active { display: block; }
        .detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .detail-name { font-size: 20px; font-weight: 700; }
        .detail-faction { font-size: 12px; color: #888; background: #0f3460; padding: 4px 10px; border-radius: 12px; }
        .detail-tier { font-size: 12px; padding: 4px 10px; border-radius: 12px; }
        .detail-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
        .metric { background: #0f3460; padding: 16px; border-radius: 8px; text-align: center; }
        .metric-value { font-size: 24px; font-weight: 700; }
        .metric-label { font-size: 11px; color: #888; margin-top: 4px; }
        .detail-analysis { background: #0f3460; padding: 16px; border-radius: 8px; font-size: 13px; line-height: 1.6; border-left: 3px solid #60a5fa; color: #ccc; }
        
        @media (max-width: 1024px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #0f3460; padding: 12px 16px; }
            .main { padding: 16px; }
            .chart-wrapper { height: 250px; }
            .chart-box { padding: 16px; }
            .header h1 { font-size: 20px; }
            .detail-metrics { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .sidebar { padding: 10px 12px; }
            .sidebar h3 { font-size: 12px; margin-bottom: 8px; }
            .mode-btn { padding: 10px 12px; font-size: 13px; margin-bottom: 4px; }
            .main { padding: 12px; }
            .chart-wrapper { height: 200px; }
            .chart-box { padding: 12px; border-radius: 8px; }
            .identity-selector { padding: 12px; margin-bottom: 16px; }
            .chart-grid { gap: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h3>🎮 模式选择</h3>
            <button class="mode-btn active" data-mode="诸神排位">⚔️ 诸神排位</button>
            <button class="mode-btn" data-mode="巅峰赛">🏆 巅峰赛</button>
            <button class="mode-btn" data-mode="特别行动单人排位">💥 特别行动</button>
            <h3 style="margin-top:20px;">⚔️ 阵营筛选</h3>
            <button class="mode-btn camp-btn active" data-camp="all">全部</button>
            <button class="mode-btn camp-btn" data-camp="astronaut">🚀 宇航员</button>
            <button class="mode-btn camp-btn" data-camp="invader">👾 入侵者</button>
            <button class="mode-btn camp-btn" data-camp="neutral">⚖️ 中立</button>
        </div>
        <div class="main">
            <div class="header">
                <h1>📊 身份胜率与参与率趋势分析</h1>
                <p id="dateRange">日期范围：加载中...</p>
            </div>
            
            <div class="ai-summary" id="aiSummary">
                <div class="ai-summary-title">🤖 AI 模式分析</div>
                <div id="aiSummaryText">加载中...</div>
            </div>
            
            <div class="identity-selector">
                <div class="selector-header">
                    <h3>🎯 身份选择</h3>
                    <div class="btn-group">
                        <button class="btn" id="selectAll">全选</button>
                        <button class="btn" id="clearAll">清除</button>
                        <button class="btn" id="toggleTrend">趋势线: 关</button>
                    </div>
                </div>
                <div class="identity-list" id="identityList"></div>
            </div>
            
            <div class="chart-grid">
                <div class="chart-box">
                    <div class="chart-header">
                        <h3>📈 胜率趋势</h3>
                    </div>
                    <div class="chart-wrapper"><canvas id="winRateChart"></canvas></div>
                    <div class="trend-info">
                        <h4>📉 胜率趋势汇总 <span id="winSlopeInfo"></span></h4>
                        <div class="trend-list" id="winTrendList"></div>
                        <div class="legend-note">⬆ 上升 >0.3%/天 | ⬇ 下降 <-0.3%/天 | ➡ 平稳</div>
                    </div>
                </div>
                <div class="chart-box">
                    <div class="chart-header">
                        <h3>📊 参与率趋势</h3>
                    </div>
                    <div class="chart-wrapper"><canvas id="pickRateChart"></canvas></div>
                    <div class="trend-info">
                        <h4>📊 参与率趋势汇总 <span id="pickSlopeInfo"></span></h4>
                        <div class="trend-list" id="pickTrendList"></div>
                        <div class="legend-note">⬆ 上升 >0.3%/天 | ⬇ 下降 <-0.3%/天 | ➡ 平稳</div>
                    </div>
                </div>
            </div>
            
            <div class="tier-section">
                <div class="tier-header">
                    <h3>🏆 T1-T4 分级表</h3>
                    <div class="tier-legend">
                        <div class="tier-legend-item"><div class="tier-dot" style="background:#ef4444"></div>T1 顶尖</div>
                        <div class="tier-legend-item"><div class="tier-dot" style="background:#f59e0b"></div>T2 强势</div>
                        <div class="tier-legend-item"><div class="tier-dot" style="background:#22c55e"></div>T3 平稳</div>
                        <div class="tier-legend-item"><div class="tier-dot" style="background:#6b7280"></div>T4 弱势</div>
                    </div>
                </div>
                <table class="tier-table" id="tierTable">
                    <thead><tr><th>角色</th><th>阵营</th><th>胜率</th><th>登场率</th><th>综合分</th><th>等级</th></tr></thead>
                    <tbody id="tierTableBody"></tbody>
                </table>
            </div>
            
            <div class="role-detail" id="roleDetail">
                <div class="detail-header">
                    <span class="detail-name" id="detailName"></span>
                    <span class="detail-faction" id="detailFaction"></span>
                    <span class="detail-tier tier-badge" id="detailTier"></span>
                </div>
                <div class="detail-metrics">
                    <div class="metric"><div class="metric-value" id="detailWR">-</div><div class="metric-label">胜率</div></div>
                    <div class="metric"><div class="metric-value" id="detailPR">-</div><div class="metric-label">登场率</div></div>
                    <div class="metric"><div class="metric-value" id="detailScore">-</div><div class="metric-label">综合分</div></div>
                    <div class="metric"><div class="metric-value" id="detailChange">-</div><div class="metric-label">较上期</div></div>
                </div>
                <div class="detail-analysis" id="detailAnalysis"></div>
            </div>
        </div>
    </div>
    <script>
    let fullData = {};
    let baselines = {};
    let currentMode = '诸神排位';
    let currentCamp = 'all';
    let selectedIdentities = [];
    let showTrend = false;
    let winRateChart = null;
    let pickRateChart = null;
    
    const campNames = { astronaut: '🚀宇航员', invader: '👾入侵者', neutral: '⚖️中立' };
    const campSimple = { astronaut: 'Astronaut', invader: 'Invader', neutral: 'Neutral' };
    const modeNames = { '诸神排位': 'Gods Ranking', '巅峰赛': 'Peak Tournament', '特别行动单人排位': 'Special Ops Solo' };
    
    async function loadData() {
        const resp = await fetch('./data.json');
        fullData = await resp.json();
        calcBaselines();
        initApp();
    }
    
    function calcBaselines() {
        baselines = {};
        for (const mode in fullData) {
            baselines[mode] = {};
            for (const camp of ['astronaut', 'invader', 'neutral']) {
                const allWR = [], allPR = [];
                for (const date in fullData[mode]) {
                    for (const e of fullData[mode][date]?.[camp] || []) {
                        allWR.push(e[1]);
                        allPR.push(e[2]);
                    }
                }
                allWR.sort((a, b) => a - b);
                allPR.sort((a, b) => a - b);
                baselines[mode][camp] = {
                    wr_p50: percentile(allWR, 50),
                    wr_p90: percentile(allWR, 90),
                    pr_p50: percentile(allPR, 50),
                    pr_p90: percentile(allPR, 90)
                };
            }
        }
    }
    
    function percentile(arr, p) {
        if (!arr.length) return 50;
        const idx = Math.round((p / 100) * arr.length) - 1;
        return arr[Math.max(0, Math.min(idx, arr.length - 1))];
    }
    
    function calcScore(winRate, pickRate, mode, camp) {
        const b = baselines[mode]?.[camp];
        if (!b) return 0;
        const wr_range = b.wr_p90 - b.wr_p50 || 1;
        const pr_range = b.pr_p90 - b.pr_p50 || 1;
        const wr_dev = (winRate - b.wr_p50) / wr_range;
        const pr_dev = (pickRate - b.pr_p50) / pr_range;
        const wr_score = Math.sign(wr_dev) * Math.pow(Math.abs(wr_dev), 0.7);
        const pr_score = Math.sign(pr_dev) * Math.pow(Math.abs(pr_dev), 0.7);
        return wr_score * 0.7 + pr_score * 0.3;
    }
    
    function getTier(score) {
        if (score >= 0.5) return { tier: 'T1', label: '顶尖', color: '#ef4444', cls: 'tier-t1' };
        if (score >= 0.3) return { tier: 'T2', label: '强势', color: '#f59e0b', cls: 'tier-t2' };
        if (score >= 0.1) return { tier: 'T3', label: '平稳', color: '#22c55e', cls: 'tier-t3' };
        return { tier: 'T4', label: '弱势', color: '#6b7280', cls: 'tier-t4' };
    }
    
    function getDates(mode) {
        const allDates = Object.keys(fullData[mode] || {}).sort();
        if (allDates.length === 0) return [];
        return allDates.slice(-7);
    }
    
    function getIdentities(mode, camp) {
        const dates = getDates(mode);
        const identities = {};
        for (const date of dates) {
            for (const c of ['astronaut', 'invader', 'neutral']) {
                if (camp !== 'all' && c !== camp) continue;
                const entries = fullData[mode][date]?.[c] || [];
                for (const entry of entries) {
                    const name = entry[0];
                    if (!identities[name]) {
                        identities[name] = { name, camp: c, winRates: [], pickRates: [], dates: [] };
                    }
                    identities[name].winRates.push(entry[1]);
                    identities[name].pickRates.push(entry[2]);
                    identities[name].dates.push(date);
                }
            }
        }
        return Object.values(identities);
    }
    
    function linearRegression(yValues) {
        const n = yValues.length;
        if (n < 2) return { slope: 0, intercept: yValues[0] || 0 };
        const xValues = yValues.map((_, i) => i);
        const sumX = xValues.reduce((a, b) => a + b, 0);
        const sumY = yValues.reduce((a, b) => a + b, 0);
        const sumXY = xValues.reduce((sum, x, i) => sum + x * yValues[i], 0);
        const sumXX = xValues.reduce((sum, x) => sum + x * x, 0);
        const slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
        const intercept = (sumY - slope * sumX) / n;
        return { slope, intercept };
    }
    
    function buildDatasets(selected) {
        const colors = ['#e94560', '#4ade80', '#fbbf24', '#60a5fa', '#f472b6', '#a78bfa', '#34d399', '#fb923c', '#818cf8', '#fb7185'];
        const dashColors = ['#ff8a9a', '#7deda0', '#fcd34d', '#93c5fd', '#f9a8d4', '#c4b5fd', '#6ee7b7', '#fdba74', '#a5b4fc', '#fda4af'];
        const datasets = [];
        selected.forEach((id, idx) => {
            const color = colors[idx % colors.length];
            const dashColor = dashColors[idx % dashColors.length];
            const reg = linearRegression(id.winRates);
            const trendLine = id.winRates.map((_, i) => reg.slope * i + reg.intercept);
            datasets.push({
                label: id.name,
                data: id.winRates,
                borderColor: color,
                backgroundColor: color + '20',
                borderWidth: 2,
                pointRadius: 4,
                pointHoverRadius: 6,
                tension: 0.3,
                _slope: reg.slope,
                _trendData: trendLine
            });
            if (showTrend) {
                datasets.push({
                    label: id.name + ' (趋势线)',
                    data: trendLine,
                    borderColor: dashColor,
                    backgroundColor: 'transparent',
                    borderWidth: 2,
                    borderDash: [5, 5],
                    pointRadius: 0,
                    tension: 0,
                    _slope: reg.slope
                });
            }
        });
        return datasets;
    }
    
    function buildPickDatasets(selected) {
        const colors = ['#e94560', '#4ade80', '#fbbf24', '#60a5fa', '#f472b6', '#a78bfa', '#34d399', '#fb923c', '#818cf8', '#fb7185'];
        const dashColors = ['#ff8a9a', '#7deda0', '#fcd34d', '#93c5fd', '#f9a8d4', '#c4b5fd', '#6ee7b7', '#fdba74', '#a5b4fc', '#fda4af'];
        const datasets = [];
        selected.forEach((id, idx) => {
            const color = colors[idx % colors.length];
            const dashColor = dashColors[idx % dashColors.length];
            const reg = linearRegression(id.pickRates);
            const trendLine = id.pickRates.map((_, i) => reg.slope * i + reg.intercept);
            datasets.push({
                label: id.name,
                data: id.pickRates,
                borderColor: color,
                backgroundColor: color + '20',
                borderWidth: 2,
                pointRadius: 4,
                pointHoverRadius: 6,
                tension: 0.3,
                _slope: reg.slope,
                _trendData: trendLine
            });
            if (showTrend) {
                datasets.push({
                    label: id.name + ' (趋势线)',
                    data: trendLine,
                    borderColor: dashColor,
                    backgroundColor: 'transparent',
                    borderWidth: 2,
                    borderDash: [5, 5],
                    pointRadius: 0,
                    tension: 0,
                    _slope: reg.slope
                });
            }
        });
        return datasets;
    }
    
    function renderCharts() {
        const dates = getDates(currentMode);
        const identities = getIdentities(currentMode, currentCamp);
        const selected = identities.filter(i => selectedIdentities.includes(i.name));
        
        if (winRateChart) winRateChart.destroy();
        if (pickRateChart) pickRateChart.destroy();
        
        const winCtx = document.getElementById('winRateChart').getContext('2d');
        winRateChart = new Chart(winCtx, {
            type: 'line',
            data: { labels: dates, datasets: buildDatasets(selected) },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'nearest', intersect: true },
                plugins: {
                    legend: { position: 'bottom', labels: { color: '#aaa', boxWidth: 12, padding: 8, font: { size: 11 } } },
                    tooltip: { backgroundColor: '#16213e', titleColor: '#fff', bodyColor: '#aaa', borderColor: '#0f3460', borderWidth: 1 }
                },
                scales: {
                    x: { grid: { color: '#0f3460' }, ticks: { color: '#888' } },
                    y: { grid: { color: '#0f3460' }, ticks: { color: '#888', callback: v => v + '%' } }
                }
            }
        });
        
        const pickCtx = document.getElementById('pickRateChart').getContext('2d');
        pickRateChart = new Chart(pickCtx, {
            type: 'line',
            data: { labels: dates, datasets: buildPickDatasets(selected) },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'nearest', intersect: true },
                plugins: {
                    legend: { position: 'bottom', labels: { color: '#aaa', boxWidth: 12, padding: 8, font: { size: 11 } } },
                    tooltip: { backgroundColor: '#16213e', titleColor: '#fff', bodyColor: '#aaa', borderColor: '#0f3460', borderWidth: 1 }
                },
                scales: {
                    x: { grid: { color: '#0f3460' }, ticks: { color: '#888' } },
                    y: { grid: { color: '#0f3460' }, ticks: { color: '#888', callback: v => v + '%' } }
                }
            }
        });
        
        // Update trend lists
        let winTrendHTML = '';
        let upCount = 0, downCount = 0, stableCount = 0;
        selected.forEach(id => {
            const reg = linearRegression(id.winRates);
            if (reg.slope > 0.3) upCount++; else if (reg.slope < -0.3) downCount++; else stableCount++;
        });
        document.getElementById('winSlopeInfo').textContent = '(↑' + upCount + ' ↓' + downCount + ' →' + stableCount + ')';
        selected.forEach(id => {
            const reg = linearRegression(id.winRates);
            const slope = reg.slope;
            const cls = slope > 0.3 ? 'trend-up' : slope < -0.3 ? 'trend-down' : 'trend-stable';
            const icon = slope > 0.3 ? '⬆' : slope < -0.3 ? '⬇' : '➡';
            winTrendHTML += '<div class="trend-item"><span class="trend-name">' + id.name + '</span><span class="' + cls + '">' + icon + ' ' + (slope > 0 ? '+' : '') + slope.toFixed(2) + '%/天</span></div>';
        });
        document.getElementById('winTrendList').innerHTML = winTrendHTML || '<div style="color:#666">请先选择身份</div>';
        
        let pickTrendHTML = '';
        upCount = 0; downCount = 0; stableCount = 0;
        selected.forEach(id => {
            const reg = linearRegression(id.pickRates);
            if (reg.slope > 0.3) upCount++; else if (reg.slope < -0.3) downCount++; else stableCount++;
        });
        document.getElementById('pickSlopeInfo').textContent = '(↑' + upCount + ' ↓' + downCount + ' →' + stableCount + ')';
        selected.forEach(id => {
            const reg = linearRegression(id.pickRates);
            const slope = reg.slope;
            const cls = slope > 0.3 ? 'trend-up' : slope < -0.3 ? 'trend-down' : 'trend-stable';
            const icon = slope > 0.3 ? '⬆' : slope < -0.3 ? '⬇' : '➡';
            pickTrendHTML += '<div class="trend-item"><span class="trend-name">' + id.name + '</span><span class="' + cls + '">' + icon + ' ' + (slope > 0 ? '+' : '') + slope.toFixed(2) + '%/天</span></div>';
        });
        document.getElementById('pickTrendList').innerHTML = pickTrendHTML || '<div style="color:#666">请先选择身份</div>';
    }
    
    function renderIdentityList() {
        const identities = getIdentities(currentMode, currentCamp);
        const listEl = document.getElementById('identityList');
        listEl.innerHTML = '';
        const byCamp = { astronaut: [], invader: [], neutral: [] };
        identities.forEach(id => byCamp[id.camp].push(id));
        const campOrder = currentCamp === 'all' ? ['astronaut', 'invader', 'neutral'] : [currentCamp];
        campOrder.forEach(camp => {
            byCamp[camp].forEach(id => {
                const div = document.createElement('div');
                div.style.cssText = 'display:flex;align-items:center;margin-bottom:4px;';
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.className = 'identity-checkbox';
                cb.id = 'id_' + id.name;
                cb.value = id.name;
                if (selectedIdentities.includes(id.name)) cb.checked = true;
                const label = document.createElement('label');
                label.className = 'identity-label';
                label.htmlFor = 'id_' + id.name;
                label.textContent = campNames[camp].replace(/\S+/, '') + ' ' + id.name;
                cb.addEventListener('change', () => {
                    if (cb.checked) {
                        if (!selectedIdentities.includes(id.name)) selectedIdentities.push(id.name);
                    } else {
                        selectedIdentities = selectedIdentities.filter(n => n !== id.name);
                    }
                    renderCharts();
                });
                div.appendChild(cb);
                div.appendChild(label);
                listEl.appendChild(div);
            });
        });
    }
    
    function renderTierTable() {
        const dates = getDates(currentMode);
        if (!dates.length) return;
        const latestDate = dates[dates.length - 1];
        const roles = [];
        for (const camp of ['astronaut', 'invader', 'neutral']) {
            if (currentCamp !== 'all' && camp !== currentCamp) continue;
            for (const e of fullData[currentMode][latestDate]?.[camp] || []) {
                const score = calcScore(e[1], e[2], currentMode, camp);
                const tier = getTier(score);
                // Find previous for change
                let wrChange = null;
                if (dates.length > 1) {
                    const prevDate = dates[dates.length - 2];
                    const prev = fullData[currentMode][prevDate]?.[camp]?.find(x => x[0] === e[0]);
                    if (prev) wrChange = (e[1] - prev[1]).toFixed(1);
                }
                roles.push({ name: e[0], camp, winRate: e[1], pickRate: e[2], score, tier, wrChange });
            }
        }
        roles.sort((a, b) => b.score - a.score);
        const tbody = document.getElementById('tierTableBody');
        tbody.innerHTML = roles.slice(0, 30).map(r => {
            const wrClass = r.winRate >= 50 ? 'style="color:#4ade80"' : r.winRate < 40 ? 'style="color:#f87171"' : '';
            const barColor = r.score >= 0 ? '#4ade80' : '#f87171';
            const barWidth = Math.min(100, Math.abs(r.score) * 50);
            return '<tr onclick="showRoleDetail(\'' + r.name + '\')">' +
                '<td><b>' + r.name + '</b></td>' +
                '<td style="color:#888;font-size:12px">' + campSimple[r.camp] + '</td>' +
                '<td ' + wrClass + '>' + r.winRate + '%</td>' +
                '<td>' + r.pickRate + '%</td>' +
                '<td><span class="score-bar"><span class="score-fill" style="width:' + barWidth + '%;background:' + barColor + '"></span></span>' + r.score.toFixed(2) + '</td>' +
                '<td><span class="tier-badge ' + r.tier.cls + '">' + r.tier.tier + ' ' + r.tier.label + '</span></td>' +
                '</tr>';
        }).join('');
    }
    
    function renderAISummary() {
        const dates = getDates(currentMode);
        if (!dates.length) return;
        const latestDate = dates[dates.length - 1];
        const roles = [];
        for (const camp of ['astronaut', 'invader', 'neutral']) {
            for (const e of fullData[currentMode][latestDate]?.[camp] || []) {
                const score = calcScore(e[1], e[2], currentMode, camp);
                const tier = getTier(score);
                roles.push({ name: e[0], camp, winRate: e[1], pickRate: e[2], score, tier });
            }
        }
        roles.sort((a, b) => b.score - a.score);
        const t1 = roles.filter(r => r.tier.tier === 'T1').slice(0, 3);
        const t4 = roles.filter(r => r.tier.tier === 'T4').slice(0, 3);
        // Find biggest change
        let biggestChange = null;
        if (dates.length > 1) {
            const prevDate = dates[dates.length - 2];
            for (const camp of ['astronaut', 'invader', 'neutral']) {
                for (const e of fullData[currentMode][latestDate]?.[camp] || []) {
                    const prev = fullData[currentMode][prevDate]?.[camp]?.find(x => x[0] === e[0]);
                    if (prev) {
                        const ch = e[1] - prev[1];
                        if (!biggestChange || Math.abs(ch) > Math.abs(biggestChange)) {
                            biggestChange = { name: e[0], change: ch };
                        }
                    }
                }
            }
        }
        let summary = modeNames[currentMode] + '模式整体表现：';
        if (t1.length) summary += 'T1顶尖角色包括' + t1.map(r => r.name + '(' + r.winRate + '%)').join('、') + '；';
        if (t4.length) summary += '弱势角色需关注' + t4.map(r => r.name + '(' + r.winRate + '%)').join('、') + '；';
        if (biggestChange) {
            summary += '最大异动' + biggestChange.name + (biggestChange.change >= 0 ? '↑' : '↓') + Math.abs(biggestChange.change).toFixed(1) + '%';
        }
        document.getElementById('aiSummaryText').textContent = summary;
    }
    
    function showRoleDetail(name) {
        const dates = getDates(currentMode);
        if (!dates.length) return;
        const latestDate = dates[dates.length - 1];
        let roleData = null;
        for (const camp of ['astronaut', 'invader', 'neutral']) {
            const e = fullData[currentMode][latestDate]?.[camp]?.find(x => x[0] === name);
            if (e) {
                const score = calcScore(e[1], e[2], currentMode, camp);
                const tier = getTier(score);
                let wrChange = null;
                if (dates.length > 1) {
                    const prevDate = dates[dates.length - 2];
                    const prev = fullData[currentMode][prevDate]?.[camp]?.find(x => x[0] === name);
                    if (prev) wrChange = (e[1] - prev[1]).toFixed(1);
                }
                roleData = { name: e[0], camp, winRate: e[1], pickRate: e[2], score, tier, wrChange };
                break;
            }
        }
        if (!roleData) return;
        document.getElementById('detailName').textContent = roleData.name;
        document.getElementById('detailFaction').textContent = campSimple[roleData.camp];
        document.getElementById('detailTier').textContent = roleData.tier.tier + ' ' + roleData.tier.label;
        document.getElementById('detailTier').style.background = roleData.tier.color + '22';
        document.getElementById('detailTier').style.color = roleData.tier.color;
        document.getElementById('detailWR').textContent = roleData.winRate + '%';
        document.getElementById('detailPR').textContent = roleData.pickRate + '%';
        document.getElementById('detailScore').textContent = roleData.score.toFixed(2);
        document.getElementById('detailScore').style.color = roleData.tier.color;
        document.getElementById('detailChange').textContent = roleData.wrChange !== null ? (parseFloat(roleData.wrChange) >= 0 ? '+' : '') + roleData.wrChange + '%' : '-';
        let analysis = roleData.name + '在' + modeNames[currentMode] + '中表现为' + roleData.tier.tier + roleData.tier.label + '角色，胜率' + roleData.winRate + '%，登场率' + roleData.pickRate + '%，综合分' + roleData.score.toFixed(2);
        if (roleData.wrChange !== null) {
            analysis += '，较上期' + (parseFloat(roleData.wrChange) >= 0 ? '上升' : '下降') + Math.abs(roleData.wrChange) + '%';
        }
        document.getElementById('detailAnalysis').textContent = analysis;
        document.getElementById('roleDetail').classList.add('active');
        document.getElementById('roleDetail').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    
    function initApp() {
        const dates = getDates(currentMode);
        document.getElementById('dateRange').textContent = '日期范围：' + dates[0] + ' 至 ' + dates[dates.length - 1] + '（共' + dates.length + '天）';
        renderAISummary();
        renderTierTable();
        
        document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn[data-mode]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
                selectedIdentities = [];
                const newDates = getDates(currentMode);
                document.getElementById('dateRange').textContent = '日期范围：' + newDates[0] + ' 至 ' + newDates[newDates.length - 1] + '（共' + newDates.length + '天）';
                renderIdentityList();
                renderCharts();
                renderAISummary();
                renderTierTable();
                document.getElementById('roleDetail').classList.remove('active');
            });
        });
        
        document.querySelectorAll('.mode-btn[data-camp]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn[data-camp]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCamp = btn.dataset.camp;
                selectedIdentities = [];
                renderIdentityList();
                renderCharts();
                renderTierTable();
            });
        });
        
        document.getElementById('selectAll').addEventListener('click', () => {
            const cbs = document.querySelectorAll('.identity-checkbox');
            cbs.forEach(cb => { cb.checked = true; if (!selectedIdentities.includes(cb.value)) selectedIdentities.push(cb.value); });
            renderCharts();
        });
        
        document.getElementById('clearAll').addEventListener('click', () => {
            selectedIdentities = [];
            document.querySelectorAll('.identity-checkbox').forEach(cb => cb.checked = false);
            renderCharts();
        });
        
        document.getElementById('toggleTrend').addEventListener('click', () => {
            showTrend = !showTrend;
            const btn = document.getElementById('toggleTrend');
            btn.textContent = '趋势线: ' + (showTrend ? '开' : '关');
            btn.classList.toggle('active', showTrend);
            renderCharts();
        });
        
        renderIdentityList();
        renderCharts();
    }
    
    loadData();
    </script>
</body>
</html>
